default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: ty-check
        name: ty check
        entry: bash -c 'uv run ty check src tests scripts'
        language: system
        pass_filenames: false

      - id: strata-check
        name: strata self-check
        entry: bash -c 'uv run strata check'
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: bash -c 'uv run pytest tests/unit tests/integration -q -n auto'
        language: system
        pass_filenames: false

      - id: conventional-commit
        name: conventional commit message
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]
