[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "stratalint"
version = "0.0.2"
description = "Strata is an architecture linter for Python repos - it stops forbidden imports, bloated modules, and dishonest functions before they turn into spaghetti."
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE" }

[project.scripts]
strata = "strata.cli.main.entry:main"

[tool.hatch.build.targets.wheel]
packages = ["src/strata"]

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-xdist>=3.6",
  "ruff>=0.12.0",
  "ty>=0.0.1a19",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["B", "E", "F", "I", "PLR0913", "PLR0915", "UP"]

[tool.ruff.lint.pylint]
max-args = 10
max-statements = 70

[tool.ruff.lint.per-file-ignores]
"tests/**/test_*.py" = ["E501"]
"tests/**/helpers.py" = ["PLR0913"]
