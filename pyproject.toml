[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "stratalint"
version = "0.14.0"
description = "Architecture linting for Python repositories"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
license-files = ["LICENSE"]
keywords = ["architecture", "lint", "linter", "python", "static-analysis"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Quality Assurance",
]

[project.urls]
Homepage = "https://github.com/chio-labs/strata"
Issues = "https://github.com/chio-labs/strata/issues"
Repository = "https://github.com/chio-labs/strata"

[project.scripts]
strata = "strata.cli.main.entry:main"

[tool.hatch.build.targets.wheel]
packages = ["src/strata"]

[dependency-groups]
dev = [
  "commitizen>=4.16.4",
  "pre-commit>=4.6.0",
  "pytest>=8.0",
  "pytest-xdist>=3.6",
  "ruff>=0.12.0",
  "ty>=0.0.1a19",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["B", "E", "F", "I", "PLR0913", "PLR0915", "UP"]

[tool.ruff.lint.pylint]
max-args = 10
max-statements = 70

[tool.ruff.lint.per-file-ignores]
"tests/**/test_*.py" = ["E501"]
"tests/**/helpers.py" = ["PLR0913"]
